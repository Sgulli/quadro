name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency: release

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Tag must match package.json version
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual=$(node -p "require('./packages/core/package.json').version")
          if [ "$expected" != "$actual" ]; then
            echo "Tag v$expected doesn't match package.json version $actual"
            exit 1
          fi

      - name: Tag must be on main
        run: |
          merge_base=$(git merge-base HEAD origin/main 2>/dev/null || true)
          if [ -z "$merge_base" ]; then
            echo "Could not find origin/main — skipping branch check (CI may not have it)"
            exit 0
          fi
          ancestor_of_main=$(git merge-base --is-ancestor HEAD origin/main && echo yes || echo no)
          if [ "$ancestor_of_main" = "no" ]; then
            echo "Tag commit is not an ancestor of main — publish only from main"
            exit 1
          fi

      - run: pnpm turbo run typecheck test build

      - name: Publish @qquadro/core
        run: pnpm -F @qquadro/core publish --provenance --no-git-checks

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
