name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm turbo run typecheck
      - run: pnpm turbo run test
      - run: pnpm turbo run build

  auto-tag:
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create version tag if missing and trigger release
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1 || true)
          VERSION="v$(jq -r .version packages/core/package.json)"
          if [ "$LATEST_TAG" != "$VERSION" ]; then
            echo "Creating tag $VERSION (latest tag was $LATEST_TAG)"
            git tag "$VERSION"
            git push origin "$VERSION"
            gh workflow run release.yml --ref "$VERSION"
          else
            echo "Tag $VERSION already exists, skipping"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
